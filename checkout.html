<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Sunzuri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0c;
  --card:#121214;
  --accent:#ffb703;
  --accent2:#fb8500;
  --text:#ffffff;
  --muted:#a1a1aa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a1a1d, #0b0b0c);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
}

/* MAIN CARD */
.box{
  width:100%;
  max-width:650px;
  background:rgba(18,18,20,0.9);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:fadeUp 0.6s ease;
}

/* HEADER */
h2{
  text-align:center;
  color:var(--accent);
  font-size:28px;
  margin-bottom:20px;
}

/* CART ITEMS */
#cart{
  margin-top:20px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:12px 15px;
  margin-bottom:10px;
  background:#1a1a1d;
  border-radius:12px;
  transition:0.3s;
}

.item:hover{
  transform:translateY(-2px);
  background:#222227;
}

/* TOTAL */
.total{
  margin-top:20px;
  font-size:22px;
  font-weight:600;
  color:var(--accent);
  text-align:right;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-top:25px;
  border:none;
  border-radius:12px;
  background:#1a1a1d;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

input:focus{
  box-shadow:0 0 0 2px var(--accent);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
  color:#000;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(255,183,3,0.3);
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
  .box{
    padding:20px;
  }

  h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="box">
  <h2>Checkout</h2>

  <div id="cart"></div>

  <div class="total" id="total"></div>

  <input id="phone" placeholder="Enter M-Pesa Number (07XXXXXXXX)">

  <button onclick="pay()">Pay with M-Pesa</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<script>
/* =========================
   GLOBAL USER STATE
========================= */
let currentUser = null;

/* =========================
   AUTH + LOAD CART
========================= */
firebase.auth().onAuthStateChanged(async user => {

  if(!user){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  await loadCart();
});

/* =========================
   LOAD CART FROM FIRESTORE
========================= */
async function loadCart(){

  const snap = await firebase.firestore()
    .collection("users")
    .doc(currentUser.uid)
    .collection("cart")
    .get();

  let cart = [];

  snap.forEach(doc => {
    cart.push(doc.data());
  });

  renderCart(cart);
}

/* =========================
   RENDER CART UI
========================= */
function renderCart(cart){

  const box = document.getElementById("cart");
  const totalBox = document.getElementById("total");

  let total = 0;
  box.innerHTML = "";

  cart.forEach(item => {

    total += item.price * item.qty;

    box.innerHTML += `
      <div class="item">
        <span>${item.name} x${item.qty}</span>
        <span>KES ${item.price * item.qty}</span>
      </div>
    `;
  });

  totalBox.innerHTML = "Total: KES " + total;
}

/* =========================
   PAY WITH M-PESA
========================= */
async function pay(){

  const phone = document.getElementById("phone").value;

  if(!phone){
    alert("Enter phone number");
    return;
  }

  if(!currentUser){
    alert("Not logged in");
    return;
  }

  const snap = await firebase.firestore()
    .collection("users")
    .doc(currentUser.uid)
    .collection("cart")
    .get();

  let total = 0;

  snap.forEach(doc => {
    const item = doc.data();
    total += item.price * item.qty;
  });

  if(total <= 0){
    alert("Cart is empty");
    return;
  }

  try {

    const res = await fetch("http://localhost:5000/stkpush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone: "254" + phone.slice(1),
        amount: total,
        userId: currentUser.uid
      })
    });

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      alert("Server error. Check backend logs.");
      return;
    }

    console.log(data);

    if(!data.checkoutId){
      console.log("❌ No checkoutId returned:", data);
      alert("Payment failed. Try again.");
      return;
    }

    alert("STK sent. Complete payment on your phone 📲");

    // 🔥 START LISTENING
    listenForPayment(data.checkoutId);

  } catch (err) {
    console.log(err);
    alert("Payment failed. Try again.");
  }
}

/* =========================
   LISTEN FOR PAYMENT STATUS
========================= */
function listenForPayment(checkoutId){

  const ref = firebase.firestore()
    .collection("payments")
    .doc(checkoutId);

  const unsubscribe = ref.onSnapshot(doc => {

    if(!doc.exists) return;

    const data = doc.data();

    console.log("Payment status:", data.status);

    if(data.status === "completed"){
      alert("✅ Payment successful");
      unsubscribe();
      window.location.href = "success.html";
    }

    if(data.status === "failed"){
      alert("❌ Payment cancelled");
      unsubscribe();
    }

  });
}
</script>
</body>
</html>
