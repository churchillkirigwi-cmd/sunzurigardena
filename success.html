<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0b0c;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Poppins;
}

.box{
  text-align:center;
  background:#121214;
  padding:40px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:fade 0.5s ease;
}

h1{
  color:#4caf50;
  margin-bottom:10px;
}

p{
  color:#aaa;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
  <h1>✅ Payment Successful</h1>
  <p>Your order has been placed</p>
  <p>Redirecting...</p>
</div>

<script>
setTimeout(()=>{
  window.location.href = "index.html";
}, 4000);
</script>

</body>
</html>
