<!DOCTYPE html>

<style>
:root{
  --bg:#0b0b0c;
  --card:#121214;
  --accent:#ffb703;
  --accent2:#fb8500;
  --muted:#a1a1aa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:var(--bg);
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:rgba(0,0,0,0.6);
  border-bottom:1px solid #1f1f22;
  position:sticky;
  top:0;
  z-index:10;
}

header h2{
  color:var(--accent);
}

nav a{
  color:#ddd;
  text-decoration:none;
  margin:0 10px;
}

nav a:hover{
  color:var(--accent);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  animation:fadeIn 0.8s ease;
}

.hero h1{
  font-size:42px;
  color:var(--accent);
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:40px 60px;
}

/* EVENT CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  position:relative;
  overflow:hidden;
  transition:0.3s ease;
  border:1px solid transparent;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}

/* BADGE */
.badge{
  position:absolute;
  top:12px;
  right:12px;
  background:var(--accent);
  color:#000;
  padding:5px 10px;
  font-size:11px;
  border-radius:20px;
  font-weight:600;
}

/* TITLE */
.card h3{
  margin-bottom:10px;
}

/* TEXT */
.card p{
  color:var(--muted);
  font-size:14px;
  line-height:1.4;
}

/* BUTTON */
.btn{
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:600;
  cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}

/* FLOAT EFFECT */
.card::before{
  content:'';
  position:absolute;
  width:120px;
  height:120px;
  background:rgba(255,183,3,0.08);
  border-radius:50%;
  top:-40px;
  right:-40px;
}

/* MOBILE RESPONSIVENESS */
@media(max-width:768px){

  header{
    flex-direction:column;
    padding:15px;
    gap:10px;
    text-align:center;
  }

  .hero h1{
    font-size:30px;
  }

  .grid{
    padding:20px;
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h2>Sunzuri Events</h2>
