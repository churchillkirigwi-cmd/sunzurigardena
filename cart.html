<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart - Sunzuri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0b0b0c;
  color: #fff;
  padding: 20px;
}

h1 {
  color: #ffb703;
  text-align: center;
  margin-bottom: 30px;
}

.cart-container {
  max-width: 600px;
  margin: auto;
}

.cart-item {
  background: #121214;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.details b {
  display: block;
  font-size: 18px;
  color: #ffb703;
}

.details span {
  font-size: 14px;
  color: #aaa;
}

.controls {
  display: flex;
  align-items: center;
  gap: 15px;
}

.btn-qty {
  background: #1a1a1d;
  color: #ffb703;
  border: 1px solid #ffb703;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
}

.btn-qty:hover {
  background: #ffb703;
  color: #000;
}

.qty-display {
  font-weight: 600;
  font-size: 16px;
  min-width: 20px;
  text-align: center;
}

.checkout-box {
  margin-top: 30px;
  text-align: center;
  border-top: 1px solid #222;
  padding-top: 20px;
}

.total-price {
  font-size: 22px;
  margin-bottom: 20px;
}

.pay-btn {
  background: linear-gradient(135deg, #ffb703, #fb8500);
  color: #000;
  padding: 15px 40px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
}

.empty-msg {
  text-align: center;
  color: #777;
  margin-top: 50px;
}

.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: #ffb703;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="cart-container">
  <a href="menu.html" class="back-link">← Back to Menu</a>
  
  <h1>🛒 Your Cart</h1>

  <div id="cartItems">
    <!-- Items will be injected here -->
  </div>

  <div class="checkout-box" id="checkoutBox" style="display:none;">
    <div class="total-price">Total: <b id="grandTotal">KES 0</b></div>
    <button class="pay-btn" onclick="goToCheckout()">Proceed to Checkout</button>
  </div>
</div>

<!-- FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* =========================
   FIREBASE CONFIG
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyA6o6lgDHFRg_gQkio9HIpcnU25DB2Ctu8",
  authDomain: "sunzurirestaurant.firebaseapp.com",
  projectId: "sunzurirestaurant",
  storageBucket: "sunzurirestaurant.appspot.com",
  messagingSenderId: "1079501361337",
  appId: "1:1079501361337:web:8385d1c20f8d77ac804b68"
};

// Initialize Firebase
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

/* =========================
   AUTH CHECK
========================= */
auth.onAuthStateChanged(user => {
  if(!user){
    // If not logged in, send to login page
    window.location.href = "login.html";
    return;
  }
  // Load this specific user's cart
  loadCart(user.uid);
});

/* =========================
   LOAD CART ITEMS (REAL-TIME)
========================= */
function loadCart(uid){
  // Listen for real-time changes in the user's cart sub-collection[cite: 3]
  db.collection("users").doc(uid).collection("cart")
    .onSnapshot(snapshot => {
      const container = document.getElementById("cartItems");
      const checkoutBox = document.getElementById("checkoutBox");
      
      if(snapshot.empty){
        container.innerHTML = `<div class="empty-msg">Your cart is empty. Time to go back to the menu!</div>`;
        checkoutBox.style.display = "none";
        return;
      }

      checkoutBox.style.display = "block";
      container.innerHTML = "";
      let total = 0;

      snapshot.forEach(doc => {
        const item = doc.data();
        const itemTotal = (item.price || 0) * (item.qty || 0);
        total += itemTotal;

        container.innerHTML += `
          <div class="cart-item">
            <div class="details">
              <b>${item.name}</b>
              <span>KES ${item.price}</span>
            </div>
            
            <div class="controls">
              <button class="btn-qty" onclick="changeQty('${doc.id}', -1)">-</button>
              <span class="qty-display">${item.qty}</span>
              <button class="btn-qty" onclick="changeQty('${doc.id}', 1)">+</button>
            </div>
          </div>
        `;
      });

      document.getElementById("grandTotal").innerText = "KES " + total;
    });
}

/* =========================
   CHANGE QUANTITY LOGIC (+ / -)
========================= */
async function changeQty(docId, delta){
  const user = auth.currentUser;
  if(!user) return;

  const itemRef = db.collection("users").doc(user.uid).collection("cart").doc(docId);
  
  try {
    const doc = await itemRef.get();
    if(!doc.exists) return;

    const currentQty = doc.data().qty || 0;
    const newQty = currentQty + delta;

    if(newQty <= 0){
      // If quantity hits 0, delete the item from the database[cite: 3]
      await itemRef.delete();
    } else {
      // Otherwise, update the count in Firestore[cite: 3]
      await itemRef.update({ qty: newQty });
    }
  } catch (error) {
    console.error("Error updating cart:", error);
  }
}

/* =========================
   NAVIGATION
========================= */
function goToCheckout(){
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
